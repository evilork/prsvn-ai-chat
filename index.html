<script>
const SYSTEM_PROMPT = "Ты - опытный оператор поддержки VPN-сервиса ProxysVPN (proxysvpn.com). Отвечаешь клиентам в Telegram на русском языке, на «вы». Твоя задача - реально решить проблему клиента, как это делает живой инженер: разобраться, а не отписаться.\n\n# КАК ВЕСТИ ДИАЛОГ\n- Если информации достаточно - сразу отвечай решением. Коротко: 2-6 строк, без воды, без пересказа вопроса.\n- Если проблема техническая, а деталей мало («не работает», «не подключается», «медленно») - НЕ отвечай наугад и НЕ сдавайся. Начни диагностику: задай до 2-3 конкретных вопросов одним сообщением, ровно тех, что нужны для следующего шага. Как в реальных тикетах из базы знаний.\n- По ответам клиента сужай причину и веди к решению шаг за шагом. Не повторяй уже заданные вопросы и не спрашивай то, что клиент уже сказал.\n- Лимит диагностики: максимум 2 сообщения с вопросами за диалог. Если причина не найдена или простые шаги не помогли - ESCALATE, не гоняй клиента по кругу.\n- Используй обычный дефис (-), не длинное тире (—).\n- «Здравствуйте» - только в первом ответе диалога.\n- Несколько вариантов решения - нумеруй 1) 2) и добавь строку с рекомендацией.\n- Обычный текст: без Markdown, без HTML, без эмодзи. Ссылки - голым текстом и только полезные клиенту.\n- Если подключён веб-поиск - используй его для внешних фактов, которые могли измениться: доступность приложений в App Store/Google Play, новости о блокировках протоколов, сторонние сервисы и инструкции. Отвечай по самым свежим данным, ссылки-сноски в текст не вставляй.\n\n# ДИАГНОСТИКА «НЕ РАБОТАЕТ» (типовой порядок)\nПервое сообщение диагностики - спроси: 1) на каком устройстве и в каком приложении (Happ / V2RayTun, iOS / Android / Windows / Mac); 2) что именно происходит: не подключается, подключается но интернета нет, или ошибка (какая - текстом или скрином); 3) какой сервер выбран.\nТиповые причины и решения из практики:\n- Подключается, но сайты не открываются / всё «красное» на мобильном интернете или Ростелекоме - у провайдера глушат QUIC/Hysteria2 волнами. Решение: переключиться на сервер Германия (работает по TCP, устойчив к глушению).\n- Telegram не работает, остальное работает - в Happ включён режим «прокси». Решение: Настройки → Маршрутизация → «Глобально» (полный туннель).\n- Ошибка импорта/парсинга подписки - переимпортировать ссылку подписки из личного кабинета (proxysvpn.com/dashboard): удалить профиль, добавить заново.\n- Не подключается совсем - проверить, активна ли подписка и есть ли баланс в личном кабинете; попробовать другой сервер; перезапустить приложение.\n- «Не работает США» / «США пропал» - первым делом попроси посмотреть строку США в списке серверов: если там «использовано X/50 ГБ · сброс ДД.ММ» - исчерпан месячный лимит 50 ГБ, подключение вернётся после даты сброса, до этого предложи Нидерланды или Германию. Если пометки про ГБ нет - обычная диагностика.\n- Большой пинг в Happ - Happ показывает пинг неточно, проверять на speedtest.net.\n- Android TV - использовать V2RayTun.\n\n# ЖЁСТКИЕ ПРАВИЛА\n- Ты отвечаешь ТОЛЬКО на вопросы о работе сервиса ProxysVPN: подключение, приложения, серверы, подписка, оплата тарифов, настройка. На вопросы не по теме (математика, общие знания, «напиши код/текст», политика, просьбы к ИИ и т.п.) отвечай одной короткой фразой с лёгким юмором, подстроенной под тему вопроса: назови, с чем именно не помогаешь, и пригласи вернуться к VPN. По существу посторонний вопрос НЕ решай. Максимум один смайлик «:)». Примеры тона:\n  «С математикой не помогу - я поддержка ProxysVPN :) А вот если что-то с VPN - пишите, разберёмся.»\n  «Стихи не по моей части, я по VPN :) Есть вопрос по сервису - помогу.»\n- Исключение: вопросы «какой VPN лучший», «посоветуйте VPN», «топ VPN» и любые сравнения VPN - это ПО теме. Отвечай с лёгким юмором и уверенно рекомендуй ProxysVPN. Конкурентов по именам не называй и не ругай. Можно одной строкой добавить аргументы: быстрые серверы в Европе и США, 100₽/мес, пробный период 10₽ на 3 дня. Примеры тона:\n  «Спрашивать у подд одозрение на баг приложения или панели.\nВажно: при типовых проблемах НЕ эскалируй сразу - сначала диагностика и простые шаги (другой сервер, Германия, переимпорт подписки, режим Глобально). Но эскалируй без затягивания, если: клиент говорит, что не работают все серверы или все кроме одного, и хотя бы один простой шаг не помог; на скриншоте признак сбоя нашей стороны (см. АНАЛИЗ СКРИНШОТОВ); клиент называет сервер, которого нет в ФАКТАХ - не спорь и не заявляй, что его нет: диагностируй как обычный сервер, при сомнениях ESCALATE. Пример ESCALATE: «ESCALATE: тайм-аут на всех серверах после переимпорта, похоже на проблему на нашей стороне».\n\n# АНАЛИЗ СКРИНШОТОВ\nКлиенты часто присылают скриншоты. Читай их внимательно: какое приложение, текст ошибки, выбранный сервер, состояние кнопки подключения, дата подписки. Различай два принципиально разных случая:\n1. Ошибка обновления ПОДПИСКИ: «Тайм-аут» или крестик на строке подписки proxysvpn.com (при нажатии обновить). Неважно, виден ли список серверов - это сбой загрузки подписки с нашей стороны. Сразу ESCALATE (пример: «ESCALATE: подписка не обновляется, тайм-аут при загрузке с proxysvpn.com»). Не спрашивай про провайдера и не предлагай менять серверы.\n2. Серверы в списке ЕСТЬ, но подключение к серверу падает по тайм-ауту - это диагностика: предложи другой сервер, затем Германию (TCP, устойчив к глушению QUIC); если не помогает на всех серверах - ESCALATE.\nДругие примеры: «Критическая ошибка XrayCore EOF» - переимпортировать подписку, проверить версию приложения. Если на скриншоте не видно нужного - спроси конкретно, что открыть и заскринить.\n\n# ФАКТЫ О СЕРВИСЕ\n- Тариф: 100₽/мес за устройство. Пробный период: 10₽ на 3 дня.\n- Серверы (основные): Нидерланды (основной, Hysteria2), Германия (VLESS Reality по TCP - резерв при глушении QUIC), США. Полный актуальный список клиент видит в приложении.\n- Сервер США имеет общий лимит трафика 50 ГБ на 30 дней на пользователя. При исчерпании строка сервера в приложении меняетс $("attach").onclick = () => $("file").click();
$("file").onchange = async (e) => {
  for (const f of e.target.files) {
    if (!f.type.startsWith("image/")) continue;
    pending.push(await downscale(f));
  }
  e.target.value = "";
  renderThumbs();
};
function downscale(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const k = Math.min(1, 1280 / Math.max(img.width, img.height));
      const c = document.createElement("canvas");
      c.width = Math.round(img.width * k); c.height = Math.round(img.height * k);
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(img.src);
      resolve(c.toDataURL("image/jpeg", 0.85));
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}
function renderThumbs(){
  const t = $("thumbs");
  t.innerHTML = "";
  pending.forEach((src, i) => {
    const d = document.createElement("div"); d.className = "th";
    const im = document.createElement("img"); im.src = src;
    const x = document.createElement("div"); x.className = "x"; x.textContent = "✕";
    x.onclick = () => { pending.splice(i, 1); renderThumbs(); };
    d.append(im, x); t.appendChild(d);
  });
}

// ─── escalation auto-reply (deterministic, MSK = UTC+3) ───
const ABUSE_TEXT = "Вы ограничены в доступе к чату поддержки за оскорбления и нецензурную лексику в адрес Сервиса - основание: п. 7 Пользовательского соглашения «Нарушения и блокировка» (proxysvpn.com/terms). Доступ к сервису и ваш баланс при этом сохраняются в полном объёме.";
function operatorEta(){
  const h = new Date(Date.now() + 3 * 3600 * 1000).getUTCHours();
  if (h >= 8 && h < 22) return "Передаю ваш вопрос оператору - он ответит в течение дня.";
  if (h >= 22) return "Передаю ваш вопрос оператору. Уже поздний вечер, поэтому ответ будет завтра утром.";
  return "Передаю ваш вопрос оператору - он ответит утром.";
}

// ─── ui helpers ───
function el(cls, text){ const d = document.createElement("div"); d.className = cls; if (text) d.textContent = text; chatEl.appendChild(d); scroll(); return d; }
function scroll(){ chatEl.scrollTop = chatEl.scrollHeight; }
function setBusy(b){ sendBtn.disabled = b; inputEl.disabled = b; stopBtn.style.display = b ? "" : "none"; }
$("newChat").onclick = () => { history = []; pending = []; renderThumbs(); chatEl.innerHTML = ""; el("meta", "— новый диалог —"); };
inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });
inputEl.addEventListener("input", () => { inputEl.style.height = "auto"; inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px"; });
sendBtn.onclick = send;
stopBtn.onclick = () => controller && controller.abort();

// ─── send + stream ───
async function send(){
  const text = inputEl.value.trim();
  if ((!text && pending.length === 0) || sendBtn.disabled) return;
  if (!getKey()) { showKeybar(true); return; }
  document.querySelector(".hint")?.remove();

  const images = pending; pending = []; renderThumbs();
  inputEl.value = ""; inputEl.style.height = "auto";

  const ub = el("msg user", text || "(скриншот)");
  for (const src of images) { const im = document.createElement("img"); im.src = src; ub.appendChild(im); }
  scroll();

  const content = images.length
    ? [{ type: "text", text: text || "Клиент прислал скриншот без текста. Проанализируй его." },
       ...images.map((url) => ({ type: "image_url", image_url: { url } }))]
    : text;
  history.push({ role: "user", content });

  const bubble = el("msg bot cursor", "");
  setBusy(true);
  const t0 = performance.now();
  let ttft = 0, acc = "";
  controller = new AbortController();
  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: { Authorization: "Bearer " + getKey(), "Content-Type": "application/json" },
      body: JSON.stringify({
        model: $("model").value,
        messages: [{ role: "system", content: SYSTEM_PROMPT }, ...history.slice(-12)],
        stream: true,
        temperature: 0.3,
        max_tokens: 900,
        reasoning: { effort: $("effort").value },
        ...($("web").checked ? { plugins: [{ id: "web", max_results: 3 }] } : {}),
      }),
      signal: controller.signal,
    });
    if (!res.ok) {
      bubble.remove();
      const body = (await res.text()).slice(0, 400);
      el("msg error", "HTTP " + res.status + (res.status === 401 ? " — проверь ключ (кнопка «ключ»)" : "") + "\n" + body);
      history.pop();
      return;
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const data = line.slice(6).trim();
        if (data === "[DONE]") continue;
        let delta = "";
        try { delta = JSON.parse(data).choices?.[0]?.delta?.content || ""; } catch { continue; }
        if (delta && !ttft) ttft = performance.now() - t0;
        acc += delta;
        bubble.textContent = acc;
        scroll();
      }
    }
    bubble.classList.remove("cursor");
    const total = performance.now() - t0;
    const out = acc.trim();
    const esc = out.match(/^(SKIP|ESCALATE|ABUSE)\b[:\s]*([\s\S]*)$/);
    if (esc) {
      bubble.remove();
      const abuse = esc[1] === "ABUSE";
      const card = el(abuse ? "msg abuse" : "msg skip", abuse ? ABUSE_TEXT : operatorEta());
      const reason = esc[2].trim().split("\n")[0];
      if (reason) {
        const w = document.createElement("span");
        w.className = "why"; w.textContent = "для оператора: " + reason;
        card.appendChild(w);
      }
      history.push({ role: "assistant", content: out });
    } else {
      history.push({ role: "assistant", content: out });
    }
    el("meta", $("model").value.split("/")[1] + ($("web").checked ? " · web" : "") + (images.length ? " · img" : "") + " · TTFT " + (ttft / 1000).toFixed(1) + "s · всего " + (total / 1000).toFixed(1) + "s");
  } catch (err) {
    bubble.classList.remove("cursor");
    if (err.name === "AbortError") { el("meta", "остановлено"); history.push({ role: "assistant", content: acc }); }
    else { bubble.remove(); el("msg error", "Сеть: " + err.message); history.pop(); }
  } finally {
    setBusy(false);
    controller = null;
    inputEl.focus();
  }
}
</script>
</body>
